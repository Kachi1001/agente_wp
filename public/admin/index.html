<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agente WP — Painel de Sessões</title>
  <style>
    :root {
      --bg: #0d1117; --panel: #161b22; --panel2: #1c2330; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #2f81f7;
      --green: #3fb950; --yellow: #d29922; --red: #f85149; --gray: #6e7681;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
    }
    header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--panel);
      position: sticky; top: 0; z-index: 10;
    }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; flex: 0 0 auto; text-align: center; }
    header .left { flex: 1 1 0; display: flex; align-items: center; }
    header .right { flex: 1 1 0; display: flex; align-items: center; justify-content: flex-end; gap: 12px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot.on { background: var(--green); } .dot.off { background: var(--red); }
    main { padding: 20px; max-width: 1100px; margin: 0 auto; }
    .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    input, button, select {
      background: var(--panel2); color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 12px; font-size: 14px; outline: none;
    }
    input:focus { border-color: var(--accent); }
    button { cursor: pointer; transition: background .12s, border-color .12s; }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.primary:hover { background: #1f6feb; }
    button.danger:hover { border-color: var(--red); color: var(--red); }
    button.small { padding: 5px 10px; font-size: 12.5px; }
    table { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 8px; overflow: hidden; }
    th, td { text-align: left; padding: 11px 14px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .03em; }
    tr:last-child td { border-bottom: none; }
    td .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge { display: inline-flex; align-items: center; gap: 6px; padding: 3px 9px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge .dot { width: 7px; height: 7px; }
    .b-CONNECTED { background: rgba(63,185,80,.15); color: var(--green); }
    .b-QR_READY { background: rgba(210,153,34,.15); color: var(--yellow); }
    .b-STARTING { background: rgba(47,129,247,.15); color: var(--accent); }
    .b-DISCONNECTED { background: rgba(248,81,73,.15); color: var(--red); }
    .b-NOT_FOUND { background: rgba(110,118,129,.15); color: var(--gray); }
    .muted { color: var(--muted); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px; }
    .parked { color: var(--red); font-weight: 600; }
    .empty { text-align: center; color: var(--muted); padding: 40px; }
    /* QR modal */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: none; align-items: center; justify-content: center; z-index: 50; }
    .modal-bg.show { display: flex; }
    .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 24px; text-align: center; max-width: 360px; }
    .modal img { width: 280px; height: 280px; background: #fff; border-radius: 8px; }
    .modal h3 { margin: 0 0 4px; } .modal p { color: var(--muted); margin: 6px 0 16px; }
    /* logs */
    .logs-head { display: flex; align-items: center; justify-content: space-between; margin: 26px 0 10px; }
    .logs-head h2 { font-size: 14px; margin: 0; }
    #logs { background: #010409; border: 1px solid var(--border); border-radius: 8px; padding: 12px; height: 280px; overflow-y: auto; font-family: ui-monospace, Menlo, monospace; font-size: 12px; line-height: 1.55; }
    .log-line { white-space: pre-wrap; word-break: break-word; }
    .ll-error { color: var(--red); } .ll-warn { color: var(--yellow); } .ll-info { color: var(--muted); }
    .toast { position: fixed; bottom: 20px; right: 20px; background: var(--panel2); border: 1px solid var(--border); padding: 12px 16px; border-radius: 8px; z-index: 60; display: none; }
    .toast.show { display: block; } .toast.err { border-color: var(--red); }
  </style>
</head>
<body>
  <header>
    <div class="left">
      <button class="small" id="centralBtn" title="Abrir a Central Tecnika">🏠 Central</button>
    </div>
    <h1>🟢 Agente WP — Painel de Sessões</h1>
    <div class="right">
      <span class="muted" id="modeLabel"></span>
      <span class="dot off" id="liveDot" title="Socket"></span>
      <span class="muted" id="liveLabel">offline</span>
      <span class="muted" id="userLabel"></span>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <input id="newId" placeholder="ID da nova sessão (ex: orcamento)" style="flex:1; min-width:220px;" />
      <button class="primary" id="createBtn">+ Criar / Iniciar</button>
      <button class="small" id="refreshBtn">↻ Atualizar</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Sessão</th><th>Status</th><th>PID</th><th>Uptime</th><th>Restarts</th><th>Último erro</th><th>Ações</th>
        </tr>
      </thead>
      <tbody id="rows"><tr><td colspan="7" class="empty">Carregando…</td></tr></tbody>
    </table>

    <div class="logs-head">
      <h2>📡 Apps conectados (Socket.IO)</h2>
      <button class="small" id="clientsRefresh">↻</button>
    </div>
    <table>
      <thead>
        <tr><th>Socket</th><th>Sessão / App</th><th>Conectado em</th><th>Endereço</th></tr>
      </thead>
      <tbody id="clients"><tr><td colspan="4" class="empty">—</td></tr></tbody>
    </table>

    <div class="logs-head">
      <h2>Logs globais (mais recentes)</h2>
      <div style="display:flex; gap:8px;">
        <select id="logLevel" class="small">
          <option value="">todos</option><option value="info">info</option>
          <option value="warn">warn</option><option value="error">error</option>
        </select>
        <button class="small" id="logsRefresh">↻</button>
        <button class="small" id="logsAuto">⏸ auto</button>
      </div>
    </div>
    <div id="logs"></div>
  </main>

  <div class="modal-bg" id="sessModal">
    <div class="modal" style="max-width:760px; width:90vw; text-align:left;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
        <h3 id="sessTitle" style="margin:0;">Terminal da sessão</h3>
        <div style="display:flex; gap:8px; align-items:center;">
          <select id="sessLevel" class="small">
            <option value="">todos</option><option value="info">info</option>
            <option value="warn">warn</option><option value="error">error</option>
          </select>
          <span class="dot off" id="sessLive"></span>
          <button class="small" id="sessClose">Fechar</button>
        </div>
      </div>
      <div id="sessLogs" style="background:#010409; border:1px solid var(--border); border-radius:8px; padding:12px; height:50vh; overflow-y:auto; font-family:ui-monospace,Menlo,monospace; font-size:12px; line-height:1.55;"></div>
    </div>
  </div>

  <div class="modal-bg" id="qrModal">
    <div class="modal">
      <h3 id="qrTitle">Escaneie o QR</h3>
      <p id="qrSub" class="muted">Abra o WhatsApp → Aparelhos conectados.</p>
      <img id="qrImg" alt="QR Code" />
      <div style="margin-top:16px;"><button id="qrClose">Fechar</button></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/admin/app.js"></script>
</body>
</html>
